meters:
  - name: subscription
    description: Monthly Power User or Commercial subscription per token.
    unit: month
    aggregation: sum
    dimensions:
      - token
  - name: fundamentals_addon
    description: Monthly Fundamentals subscription add-on.
    unit: month
    aggregation: sum
    dimensions:
      - token
principles:
  - name: Visibility
    description: Tag each Tiingo token to a single owning workload.
  - name: Allocation
    description: Allocate subscription to consuming product. Commercial use requires paid plan.
  - name: Optimization
    description: Drop Fundamentals add-on if research has moved to a different vendor.
  - name: Accountability
    description: Assign a billing owner per token; review at renewal.
maintainers:
