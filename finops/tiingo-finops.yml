description: >-
  FinOps view of Tiingo. Subscription-based with a free non-commercial Power User plan, a small
  Commercial subscription (~$10/month), and add-on subscriptions for Fundamentals (~$50/month).
  Allocation is by API token; there is no usage-based billing beyond the rate cap.
sources:
  - https://www.tiingo.com/about/pricing
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
