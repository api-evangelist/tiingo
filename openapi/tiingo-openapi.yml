        priceData:
          allOf:
          - $ref: '#/components/schemas/CryptoPriceBar'
          description: Stores the top-of-book data being returned. See the table below for the fields in this object.
        exchangeData:
          type: object
          description: The underlying data for each exchange. This will only be returned if the includeRawExchangeData
            flag is set to "true".
    YieldPlatform:
      type: object
