          type: number
          description: The opening price of the asset on the current day This value is calculated by Tiingo from
            the consolidated equity feed.
        high:
          type: number
          description: The high price of the asset on the current day This value is calculated by Tiingo from the
            consolidated equity feed.
        low:
          type: number
          description: The low price of the asset on the current day This value is calculated by Tiingo from the
            consolidated equity feed.
        volume:
          type: integer
          description: Volume will be consolidated intraday volume throughout the day. Once the official closing
            price comes in, volume may reflect the full official trading day. This field is available for convenience.
        lqSpread:
          type: number
          description: The relative lqBid/Ask spread component of the liquidity risk metric, expressed as a decimal
            (e.g. 0.04 means 4%). Corresponds to lqSpread in the thresholdLevel 4 websocket liquidity risk metric.
        lqBidPrice:
          type: number
          description: The bid price component of the liquidity risk metric. Corresponds to lqBidPrice in the thresholdLevel
            4 websocket liquidity risk metric.
        lqBidSize:
          type: integer
          description: The bid size component of the liquidity risk metric in shares. Corresponds to lqBidSize in
            the thresholdLevel 4 websocket liquidity risk metric.
        lqAskPrice:
          type: number
          description: The ask price component of the liquidity risk metric. Corresponds to lqAskPrice in the thresholdLevel
            4 websocket liquidity risk metric.
        lqAskSize:
          type: integer
          description: The ask size component of the liquidity risk metric in shares. Corresponds to lqAskSize in
            the thresholdLevel 4 websocket liquidity risk metric.
    EquityRealtimePriceBar:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date this data pertains to.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
        volume:
          type: integer
          description: The consolidated number of shares traded for the interval. This value will only be exposed
            if explicitly passed to the "columns" request parameter. E.g. ?columns=open,high,low,close, volume
    SmallXMeta:
      type: object
      properties:
        permaTicker:
          type: string
          description: Permanent Tiingo Ticker mapping to the security. Can be used as a primary key.
        ticker:
          type: string
          description: Ticker related to the asset.
        name:
          type: string
          description: Full-length name of the asset.
        baseTicker:
          type: string
          description: The base ticker for the given contract. This is the base tickers that the calendar and year
            identifier are appended to in order to create the Small Exchange ticker. E.g. "SMO"
        baseCurrency:
          type: string
          description: The currency the contract is denominated in.
        cfiCode:
          type: string
          description: The standardized CFI code for the given contract.
        firstTradingDate:
          type: string
          format: date
          description: The first date the contract was able to be traded.
        lastTradingDate:
          type: string
          format: date
          description: The last date the contract is tradeable.
        expirationDate:
          type: string
          format: date
          description: The date the contract expires.
        maturityDate:
          type: string
          format: date
          description: The date the contract reaches maturity.
        tickSize:
          type: number
          description: The smallest amount the contract can increment or decrement by.
        tickMulitplier:
          type: number
          description: The amount you need to multiple the contract price by to get the notional (in baseCurrency)
            of the value of the contract. E.g. a price of 35.0 with a baseCurrency of USD and multiplier of 100,
            means each contract is worth $3500.00 (35 * 100).
    SmallXTopOfBook:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker related to the asset.
        timestamp:
          type: string
          format: date-time
          description: The timestamp the data was last refresh on.
        quoteTimestamp:
          type: string
          format: date-time
          description: The timestamp the last time the quote (bid/ask) data was received from the Small Exchange.
        lastSaleTimestamp:
          type: string
          format: date-time
          description: The timestamp the last time the trade (last/lastSize) data was received from Small Exchange.
        last:
          type: number
          description: Last is the last trade that was executed on Small Exchange.
        lastSize:
          type: integer
          description: The amount of shares traded (volume) at the last price on Small Exchange.
        tngoLast:
          type: number
          description: Tiingo Last is either the last price or mid price. The mid price is only used if our algo
            determines it is a good proxy for the last price. So if the spread is considered wide by our algo, we
            do not use it. Also, after the official exchange print comes in, this value changes to that value. This
            value is calculated by Tiingo and not provided by the Small Exchange .
        prevClose:
          type: number
          description: Previous day's closing price of the security.
        open:
          type: number
          description: The opening price of the asset on the current day as set by "tngoLast" in the docs. This
            value is calculated by Tiingo and not provided by the Small Exchange.
        high:
          type: number
          description: The high price of the asset on the current day as set by "tngoLast" in the docs. This value
            is calculated by Tiingo and not provided by the Small Exchange.
        low:
          type: number
          description: The close price of the asset on the current day as set by "tngoLast" in the docs. This value
            is calculated by Tiingo and not provided by the Small Exchange.
        mid:
          type: number
          description: 'The mid price of the current timestamp when both "bidPrice" and "askPrice" are not-null.
            In mathematical terms: mid = (bidPrice + askPrice)/2.0 This value is calculated by Tiingo and not provided
            by the Small Exchange.'
        volume:
          type: integer
          description: Total volume traded on the Small Exchange for the given instrument.
        bidSize:
          type: number
          description: The amount of shares at the bid price.
        bidPrice:
          type: number
          description: The current bid price.
        askSize:
          type: number
          description: The amount of shares at the ask price.
        askPrice:
          type: number
          description: The current ask price.
        openInterest:
          type: integer
          description: The current Open Interest for the given instrument.
    SmallXPriceBar:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date this data pertains to.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
        volume:
          type: integer
          description: The number of shares traded on the Small Exchange.
    SmallXEodBar:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date this data pertains to.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
        settlementPrice:
          type: number
          description: The settlement price of the contract as determined by the Small Exchange.
        volume:
          type: integer
          description: The number of shares traded on the Small Exchange.
        openInterest:
          type: integer
          description: The open interest of the contract.
    ForexTopOfBook:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker related to the asset.
        quoteTimestamp:
          type: string
          format: date-time
          description: The timestamp the data was last refresh on.
        midPrice:
          type: number
          description: 'The mid price of the current timestamp when both "bidPrice" and "askPrice" are not-null.
            In mathematical terms: midPrice = (bidPrice + askPrice)/2.0'
        bidSize:
          type: number
          description: The amount of units at the bid price.
        bidPrice:
          type: number
          description: The current bid price.
        askSize:
          type: number
          description: The amount of units at the ask price.
        askPrice:
          type: number
          description: The current ask price.
    ForexPriceBar:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date this data pertains to.
        ticker:
          type: string
          description: Ticker related to the asset.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
    FundamentalsDefinition:
      type: object
      properties:
        dataCode:
          type: string
          description: An identifier representing the fundamentals field the value belongs to. For example, "peRatio."
        name:
          type: string
          description: A human-friendly readable name of the field.
        description:
          type: string
          description: A description of the field.
        statementType:
          type: string
          description: One of four values ("balanceSheet", "incomeStatement", "cashFlow", "overview"), representing
            which statement this value belongs to. For example, "netIncome" would belong to "incomeStatement".
        units:
          type: string
          description: The unit the field value is in. Value is either "$", "%" or blank. If blank, value may either
            be an integer (like shares outstanding), or a ratio.
    FundamentalsMeta:
      type: object
      properties:
        permaTicker:
          type: string
          description: Permanent Tiingo Ticker mapping to the security. Can be used as a primary key.
        ticker:
          type: string
          description: Ticker related to the asset.
        name:
          type: string
          description: Full-length name of the asset.
        isActive:
          type: boolean
          description: Boolean describing whether or not the ticker is still actively traded. If false, this ticker
            is delisted.
        isADR:
          type: boolean
          description: Boolean describing whether or not the ticker is an ADR. Value is true if listed ticker is
            an ADR.
        sector:
          type: string
          description: Sector information that is derived from sicSector and is meant to approximate GICS.
        industry:
          type: string
          description: Sector information that is derived from sicIndustry and is meant to approximate GICS.
        sicCode:
          type: integer
          description: SIC Code that represents company's business activities.
        sicSector:
          type: string
          description: Sector as determined by the SIC Code.
        sicIndustry:
          type: string
          description: Industry as determined by the SIC Code.
        reportingCurrency:
          type: string
          description: The currency the company reports their SEC statement filings in.
        location:
          type: string
          description: Location/domicile of the company. States are included for U.S. companies, otherwise countries
            for non-US companies.
        companyWebsite:
          type: string
          description: The website of the company when available.
        secFilingWebsite:
          type: string
          description: A URL to where you can find the company's SEC filings directly on the SEC website.
        statementLastUpdated:
          type: string
          format: date-time
          description: The timestamp the statement data/endpoint was last updated for the ticker.
        dailyLastUpdated:
          type: string
          format: date-time
          description: The timestamp the daily data/endpoint was last updated for the ticker.
    FundamentalsStatement:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date the statement data was released to the public.
        quarter:
          type: integer
          description: An integer corresponding to the fiscal quarter reported. A value of "0" means this is an
            Annual Report. A value of "1" through "4" corresponds to the respective fiscal quarter.
        year:
          type: integer
          description: An integer corresponding to the fiscal year reported.
        statementData:
          allOf:
          - $ref: '#/components/schemas/FundamentalsStatementData'
          description: 'Statement data that is broken out by four different fields in a JSON object. Each fields
            corresponds to a statement. The four fields are: balanceSheet : Balance sheet data incomeStatement :
            Income Statement Data cashFlow : Cash flow statement data overview : Metrics and ratios that may be
            a combination of the fields from various statements Each field will return an array of "dataCode" and
            "value" pairs that are described in the "Statement Data Table" below.'
    FundamentalsDaily:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The date the daily data corresponds to.
        marketCap:
          type: number
          description: The value of the field corresponding to the market capitalization.
        enterpriseVal:
          type: number
          description: The value of the field corresponding to the enterprise value.
        peRatio:
          type: number
          description: The value of the field corresponding to the price/earnings ratio.
        pbRatio:
          type: number
          description: The value of the field corresponding to the price/book ratio.
        trailingPEG1Y:
          type: number
          description: The value of the field corresponding to the trailing 1 year PEG Ratio.
    FundFees:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker related to the fund.
        name:
          type: string
          description: Full-length name of the fund.
        description:
          type: string
          description: Long-form descripton of the fund.
        shareClass:
          type: string
          description: Share class of the fund as described by the parent fund company.
        netExpense:
          type: number
          description: The top-level net expense ratio for the fund.
        otherShareClasses:
          type: array
          items: &id002
            type: object
          description: An array of objects representing related share classes of the given fund. See below for the
            object defintion table.
    FundFeeMetrics:
      type: object
      properties:
        prospectusDate:
          type: string
          format: date
          description: The prospectus date when the corresponding fund expense data was published.
        netExpense:
          type: number
          description: Fund's net expense ratio, or the net expenses related to the fund.
        grossExpense:
          type: number
          description: Fund's gross expense ratio, or the expenses related to running the fund.
        managementFee:
          type: number
          description: Fund's management fee, or the fees paid to the manager and/or advisors.
        12b1:
          type: number
          description: Fund's fee related to marketing expenses.
        non12b1:
          type: number
          description: Fund's fee related to distribution and smilar non 12b-1 fees.
        otherExpenses:
          type: number
          description: Fund's other expenses, or expenses related to legal, adminstrative, custodial, etc.
        acquiredFundFees:
          type: number
          description: Fund's acquired fund fees, or expenses related to underlying businesses or funds.
        feeWaiver:
          type: number
          description: Fund's fee waiver, or discount on fees.
        exchangeFeeUSD:
          type: number
          description: Fund's exchange fee if charged in USD, or expenses related to exchanging or transferring
            funds to another fund in the fund's family.
        exchangeFeePercent:
          type: number
          description: Fund's exchange fee if charged as a percentage, or expenses related to exchanging or transferring
            funds to another fund in the fund's family.
        frontLoad:
          type: number
          description: Fund's front load fee, or the upfront fee charged when investing in the fund.
        backLoad:
          type: number
          description: Fund's back load fee, or the back-end fee charged when redeeming from the fund.
        dividendLoad:
          type: number
          description: Dividend load fee, or charges on reinvested dividends.
        shareholderFee:
          type: number
          description: Fund's shareholder fees, or the potential fees when buying/selling a fund.
        accountFeeUSD:
          type: number
          description: Fund's account fees if charged in USD, or the fee required to maintain your account in USD.
        accountFeePercent:
          type: number
          description: Fund's account fees if charged as a percentage, or the fee required to maintain your account
            in percentage terms.
        redemptionFeeUSD:
          type: number
          description: Fund's redemption fees if charged in USD, or the fee charged if funds are redeemed early
            (as defined by the fund company).
        redemptionFeePercent:
          type: number
          description: Fund's redemption fees as a percentage, or the fee charged if funds are redeemed early (as
            defined by the fund company).
        portfolioTurnover:
          type: number
          description: Portfolio turnover.
        miscFees:
          type: number
          description: Fund's miscellaneous fees.
        customFees:
          type: array
          items: *id002
          description: Fund's custom fees. For a full breakdown, see the table below.
    SearchResult:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker of the given asset.
        name:
          type: string
          description: The name of the asset.
        assetType:
          type: string
          description: The asset type of the asset (Stock, ETF, & Mutual Fund).
        isActive:
          type: boolean
          description: True if the ticker is still actively quoted, and false if the ticker is no longer actively
            quoted (delisted).
        permaTicker:
          type: string
          description: Placeholder for an upcoming change to the Tiingo API that allows querying by permaticker.
        openFIGI:
          type: string
          description: Placeholder for an upcoming change to the Tiingo API that allows querying by the openFIGI
            ticker.
