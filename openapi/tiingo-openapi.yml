        lastSaleTimestamp:
          type: string
          format: date-time
          description: The timestamp the last time the trade (last/lastSize) data was received from IEX. IEX entitlement
            required
        last:
          type: number
          description: Last is the last trade that was executed on IEX. IEX entitlement required
        lastSize:
          type: integer
          description: The amount of shares traded (volume) at the last price on IEX. IEX entitlement required
        tngoLast:
          type: number
          description: Tiingo Last is either the last price or mid price. The mid price is only used if our algo
            determines it is a good proxy for the last price. So if the spread is considered wide by our algo, we
            do not use it. Also, after the official exchange print comes in, this value changes to that value. This
            value is calculated by Tiingo and not provided by IEX .
        prevClose:
          type: number
          description: Previous day's closing price of the security.This can be from any of the exchanges, NYSE,
            NASDAQ, IEX, etc.
        open:
          type: number
          description: The opening price of the asset on the current day This value is calculated by Tiingo and
            not provided by IEX.
        high:
          type: number
          description: The high price of the asset on the current day This value is calculated by Tiingo and not
            provided by IEX.
        low:
          type: number
          description: The low price of the asset on the current day This value is calculated by Tiingo and not
            provided by IEX.
        mid:
          type: number
          description: 'The mid price of the current timestamp when both "bidPrice" and "askPrice" are not-null.
            In mathematical terms: mid = (bidPrice + askPrice)/2.0 This value is calculated by Tiingo and not provided
            by IEX.'
        volume:
          type: integer
          description: Volume will be IEX Volume throughout the day, but once the official closing price comes in,
            volume will reflect the volume done on the entire day across all exchanges. This field is available
            for convenience.
        bidSize:
          type: number
          description: The amount of shares at the bid price. IEX entitlement required
        bidPrice:
          type: number
          description: The current bid price. IEX entitlement required
        askSize:
          type: number
          description: The amount of shares at the ask price. IEX entitlement required
        askPrice:
          type: number
          description: The current ask price. IEX entitlement required
