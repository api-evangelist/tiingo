    get:
      operationId: testConnection
      summary: Test API connectivity and authentication
      tags:
      - Utilities
      externalDocs:
        url: https://www.tiingo.com/documentation/general/connecting
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Confirmation message, e.g. 'You successfully sent a request'.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    apiTokenHeader:
      type: apiKey
      in: header
      name: Authorization
      description: 'Pass your API token in the Authorization header as: Authorization: Token <your-token>.'
    apiTokenQuery:
      type: apiKey
      in: query
      name: token
      description: Pass your API token directly in the request URL via the token query parameter.
  responses:
    Unauthorized:
      description: Missing or invalid API token.
    TooManyRequests:
      description: Usage limit exceeded. Tiingo limits by hourly requests (reset every hour), daily requests (reset
        at midnight EST), and monthly bandwidth (reset the first of every month at midnight EST); there is no per-minute
        or per-second rate limit.
  schemas:
    CryptoTopOfBookData:
      type: object
      properties:
        quoteTimestamp:
          type: string
          format: date-time
          description: The timestamp the last time the quote (bid/ask) data was received from any crypto exchange.
        lastSaleTimestamp:
          type: string
          format: date-time
          description: The timestamp the last time the trade (last/lastSize) data was received from any crypto exchange.
        lastPrice:
          type: number
          description: Last price is the last price that was executed on any crypto exchange.
        lastSize:
          type: number
          description: The amount of crypto volume done at the last price in the base currency.
        lastSizeNotional:
          type: number
          description: 'The last size done for the asset on the specific date in the quote currency. The notional
            of the volume traded. In mathematical terms: lastSizeNotional = lastPrice * lastSize'
        lastExchange:
          type: string
          description: The full name of the exchange the "lastPrice" and "lastSize" were executed on.
        bidSize:
          type: number
          description: The amount of shares at the bid price.
        bidPrice:
          type: number
          description: The current bid price.
        bidExchange:
          type: string
          description: The full name of the exchange the "bidPrice" and "bidSize" are located on.
        askSize:
          type: number
          description: The amount of shares at the ask price.
        askPrice:
          type: number
          description: The current ask price.
        askExchange:
          type: string
          description: The full name of the exchange the "askPrice" and "askSize" are located on.
    CryptoPriceBar:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The datetime this data pertains to. It will be a timestamp dependent upon the resampleFreq
            parameter. For example, if resampleFreq=5min, it will be in 5 min increments.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
        tradesDone:
          type: integer
          description: The number of trades done on the given date.
        volume:
          type: number
          description: The volume done for the asset on the specific date in the base currency.
        volumeNotional:
          type: number
          description: 'The last size done for the asset on the specific date in the quote currency. The volume
            done for the asset on the specific date in the quote currency. In mathematical terms: volumeNotional
            = close * volume'
    FundamentalsStatementData:
      type: object
      properties:
        dataCode:
          type: string
          description: An identifier representing the fundamentals field the value belongs to. For example, "peRatio."
        value:
          type: number
          description: The value of the field corresponding to the dataCode
    DailyMeta:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker related to the asset.
        name:
          type: string
          description: Full-length name of the asset.
        exchangeCode:
          type: string
          description: An identifier that maps which Exchange this asset is listed on.
        description:
          type: string
          description: Long-form descripton of the asset.
        startDate:
          type: string
          format: date
          description: The earliest date we have price data available for the asset. When null it means no price
            data available for the given asset.
        endDate:
          type: string
          format: date
          description: The latest date we have price data available for the asset. When null it means no price data
            available for the given asset.
    DailyPriceBar:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The date this data pertains to.
        open:
          type: number
          description: The opening price for the asset on the given date.
        high:
          type: number
          description: The high price for the asset on the given date.
        low:
          type: number
          description: The low price for the asset on the given date.
        close:
          type: number
          description: The closing price for the asset on the given date.
        volume:
          type: integer
          description: The number of shares traded for the asset.
        adjOpen:
          type: number
          description: The adjusted opening price for the asset on the given date.
        adjHigh:
          type: number
          description: The adjusted high price for the asset on the given date.
        adjLow:
          type: number
          description: The adjusted low price for the asset on the given date.
        adjClose:
          type: number
          description: The adjusted closing price for the asset on the given date.
        adjVolume:
          type: integer
          description: The number of shares traded for the asset.
        divCash:
          type: number
          description: The dividend paid out on "date" (note that "date" will be the "exDate" for the dividend).
        splitFactor:
          type: number
          description: The factor used to adjust prices when a company splits, reverse splits, or pays a distribution.
    DistributionYield:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: Date associated with the yield.
        trailingDiv1Y:
          type: string
          description: The trailing distribution yield for the asset based on the previous 1 year of distributions.
    Distribution:
      type: object
      properties:
        permaTicker:
          type: string
          description: The Tiingo permaticker.
        ticker:
          type: string
          description: Ticker related to the asset.
        exDate:
          type: string
          format: date-time
          description: The ex-Date of the distribution. In the Tiingo EOD Endpoints, this is the date where "divCash"
            will be non-zero. This is also the date used for dividend price adjustments.
        paymentDate:
          type: string
          format: date-time
          description: The payment date of the distribution.
        recordDate:
          type: string
          format: date-time
          description: The record date of the distribution.
        declarationDate:
          type: string
          format: date-time
          description: The declaration date of the distribution.
        distribution:
          type: number
          description: The total distribution for the given date.
        distributionFreqency:
          type: string
          description: 'The frequency that''s associated with this distribution. For example "q" means quarterly,
            meaning this is a declared quarterly distribution. The full list of codes is available here: w : Weekly
            bm : Bimonthly m : Monthly tm : Trimesterly q : Quarterly sa : Semiannually a : Annually ir : Irregular
            f : Final u : Unspecified c : Cancelled'
    Split:
      type: object
      properties:
        permaTicker:
          type: string
          description: The Tiingo permaticker.
        ticker:
          type: string
          description: Ticker related to the asset.
        exDate:
          type: string
          format: date-time
          description: The ex-Date of the split. In the Tiingo EOD Endpoints, this is the date where "splitFactor"
            will not be 1.0. This is also the date used for split adjustments.
        splitFrom:
          type: number
          description: The prior split ratio.
        splitTo:
          type: number
          description: The new split ratio, i.e. how many shares of "splitTo" are given for each share of "splitFrom".
        splitFactor:
          type: number
          description: 'The ratio of splitTo from splitFrom . In other words: splitFactor = splitTo/splitFrom This
            ratio is helpful in calculating split price adjustments.'
        splitStatus:
          type: string
          description: 'A code representing the status of split a : Active c : Cancelled'
    NewsArticle:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier specific to the news article.
        title:
          type: string
          description: Title of the news article.
        url:
          type: string
          description: URL of the news article.
        description:
          type: string
          description: Long-form descripton of the news story.
        publishedDate:
          type: string
          format: date-time
          description: The datetime the news story was published in UTC. This is usually reported by the news source
            and not by Tiingo. If the news source does not declare a published date, Tiingo will use the time the
            news story was discovered by our crawler farm.
        crawlDate:
          type: string
          format: date-time
          description: The datetime the news story was added to our database in UTC. This is always recorded by
            Tiingo and the news source has no input on this date. If you note a large gap between crawlDate and
            publishedDate, it means the news article was backfilled, which usually happens when we add a new data
            source or gain access to historical data archives.
        source:
          type: string
          description: The domain the news source is from.
        tickers:
          type: array
          items: *id001
          description: What tickers are mentioned in the news story using Tiingo's proprietary tagging algo.
        tags:
          type: array
          items: *id001
          description: Tags that are mapped and discovered by Tiingo using Tiingo's proprietary tagging algo.
    NewsBulkFile:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier specific to the bulk download file. Used to select which file to download.
        url:
          type: string
          description: 'A url you can use to directly download the batch file. NOTE : This url contains your Auth
            Token and is meant to be a "copy/paste" url for your convenience'
        filename:
          type: string
          description: The filename of the batch file.
        batchType:
          type: string
          description: 'Describes what kind of batch file this is. The value will either be: "base" or "incremental".
            base is an entire dump of the data and incremental is a partial dump of the data. This should be used
            in conjunction with the startDate and endDate parameters to identify the bounds of the data dump.'
        startDate:
          type: string
          format: date
          description: The end date that was used to select the News objects to generate the batch file. This is
            not inclusive. publishedDate < endDate.
        fileSizeCompressed:
          type: integer
          description: The size of the file in bytes compressed using gzip.
        fileSizeUncompressed:
          type: integer
          description: The size of the file in bytes uncompressed.
    CryptoMeta:
      type: object
      properties:
        ticker:
          type: string
          description: Ticker related to the asset.
        baseCurrency:
          type: string
          description: The base pair of the cryptocurrency, e.g. "btc" for "btcusd".
        quoteCurrency:
          type: string
          description: The quote pair of the cryptocurrency, e.g. "usd" for "btcusd".
        name:
          type: string
          description: Full-length name of the asset.
        description:
          type: string
          description: Long-form descripton of the asset.
    CryptoTopOfBook:
      type: object
