          format.
        schema:
          type: string
          format: date
      - name: sort
        in: query
        required: false
        description: 'This field allows you to specify the sort direct and which column to sort by. Prepend "-"
          if you want descending order, otherwise it will be ascending. E.g. sort=date will sort by date in ascending
          order. sort=-date will sort by date in descending order. NOTE: For Fundamentals statement only the "date"
