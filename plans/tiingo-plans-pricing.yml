specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Tiingo
providerId: tiingo
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Fintech
  - Market Data
  - Plans
description: >-
  Tiingo offers a free Power-User plan ($0/month, attribution required, light hourly rate cap) and
  a Commercial plan (~$10/month) that lifts the rate cap and unlocks commercial use. Premium add-ons
  exist for Fundamentals (~$50/month) and News. Pricing details vary by promotion; values below are
  the long-published amounts but should be re-checked against tiingo.com/about/pricing.
notes: Plans data partially reconciled - public pricing page returned limited content during
  research; figures reflect long-standing published pricing.
sources:
  - https://www.tiingo.com/about/pricing
  - https://www.tiingo.com/documentation/general/overview
plans:
  - id: tiingo-power-user
    name: Power User (Free)
    type: freemium
    description: Free plan with non-commercial use, attribution required, lower rate caps.
    entries:
      - label: Monthly subscription
        name: power_user_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Hourly request cap
        name: power_user_hour
        type: quota
        metric: requests_per_hour
        limit: 50
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: EOD, IEX, Crypto, Forex, News
      - name: Non-commercial
      - name: Attribution required
  - id: tiingo-commercial
    name: Commercial
    type: subscription
    description: Approximately $10/month for commercial use and increased rate caps.
    entries:
      - label: Monthly subscription
        name: commercial_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '10.00'
        userMultiplied: false
      - label: Hourly request cap
        name: commercial_hour
        type: quota
        metric: requests_per_hour
        limit: 5000
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Commercial usage allowed
      - name: All standard endpoints
  - id: tiingo-fundamentals-addon
    name: Fundamentals add-on
    type: subscription
    description: Approximately $50/month adds full Fundamentals API access on top of any plan.
    entries:
      - label: Monthly subscription
        name: fundamentals_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '50.00'
        userMultiplied: false
    elements:
      - name: SEC-sourced financials
      - name: 30+ years history
  - id: tiingo-enterprise
    name: Enterprise
    type: enterprise
    description: Custom pricing for redistribution, redistribution rights, and bulk fundamentals.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Redistribution rights
      - name: Custom SLA
